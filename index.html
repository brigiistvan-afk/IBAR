            width: 100%;

            height: 24px;
            border-radius: 50%;
            background: #9333ea;
            cursor: pointer;
        }

            height: 24px;
            border-radius: 50%;
            background: #9333ea;

            font-family: inherit;

            border-radius: 8px;

            font-size: 1rem;
            font-weight: 700;

            margin-top: 2px;

        .search-empty { text-align: center; color: #9ca3af; padding: 32px; font-size: 0.95rem; }

</head>
<body>
    <div class="container">
        <div class="card header">
            <h1>🎯 Ingás Blokkoldó Asszisztens</h1>
            <p>Fókusz – Feltárás – Oldás – Integráció</p>
        </div>

        <div class="card">
            <div class="progress-info">
                <span id="stepInfo">0/32 lépés</span>
                <span id="percentInfo">0%</span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar" style="width: 0%"></div>
            </div>
            <div class="steps-grid" id="stepsGrid"></div>
        </div>

        <div class="card content-card" id="contentCard"></div>

        <div class="card" id="navigationCard" style="display: none;">
            <div class="btn-grid">
                <button class="btn btn-secondary" onclick="prevStep()">← Vissza</button>
                <button class="btn btn-purple" onclick="nextStep()">Tovább →</button>
            </div>
        </div>
    </div>

    <button class="search-btn" onclick="openSearch()">🔍 Keresés</button>

    <div class="search-overlay" id="searchOverlay" onclick="closeSearchOnOverlay(event)">
        <div class="search-panel">
            <div class="search-header">
                <input type="text" class="search-input" id="searchInput" placeholder="Keresés lépések, opciók, jegyzetek között..." oninput="doSearch()">
                <button class="search-close" onclick="closeSearch()">✕</button>
            </div>
            <div class="search-results" id="searchResults">
                <div class="search-empty">Kezdj el gépelni a kereséshez...</div>
            </div>
        </div>
    </div>

    <div class="modal" id="diagramModal">
        <div class="modal-content">
            <h3 id="diagramTitle">Diagram</h3>
            <div class="question-box" id="diagramQuestion"></div>
            <div id="diagramContent"></div>
        </div>
    </div>

function motivaloUzenet(v, f) {
    if (v === null) return '';
    if (f === 0) return '🌟 Csodálatos — a blokk teljesen feloldódott! Ez egy igazi áttörés volt ma.';
    if (v >= 60) return '✨ Hatalmas ugrás! Nagyon sokat sikerült elengedni ma — érezd meg ezt a könnyebbséget!';
    if (v >= 40) return '💚 Jelentős változás történt — a tested és a lelked sokat dolgozott ma, ez meglátszik.';
    if (v >= 20) return '🌿 Jó haladás! Minden egyes lépés számít, és ma előrébb jutottál.';
    if (v > 0) return '🙂 Kis lépés, de lépés — a folyamat elindult, és ez már önmagában értékes.';
    if (v === 0) return '⚡ Az értékek nem változtak — de a feltárás megtörtént, és ez is fontos alapozás.';
    return '🤍 Néha a blokk először erősödik, mielőtt elenged — ez is a gyógyulás része.';
}

function barSzin(v) {
    if (v <= 20) return '#bbf7d0';
    if (v <= 40) return '#fde68a';
    if (v <= 60) return '#fed7aa';
    if (v <= 80) return '#fca5a5';
    return '#f87171';
}

function init() {
    renderStepsGrid();
    loadStep(0);
}

function renderStepsGrid() {
    const grid = document.getElementById('stepsGrid');
    grid.innerHTML = steps.map((step, i) => {
        let className = 'step-icon pending';
        if (i === currentStep) className = 'step-icon active';
        else if (completedSteps.includes(i)) className = 'step-icon completed';
        return '<div class="' + className + '" onclick="jumpToStep(' + i + ')" title="' + step.name + '">' + step.icon + '</div>';
    }).join('');
    
    const percent = Math.round((currentStep / steps.length) * 100);
    document.getElementById('stepInfo').textContent = currentStep + '/' + steps.length + ' lépés';
    document.getElementById('percentInfo').textContent = percent + '%';
    document.getElementById('progressBar').style.width = percent + '%';
}

function updateTEMAnalysis() {
    const t = parseInt(document.getElementById('testiSlider')?.value || 0);
    const er = parseInt(document.getElementById('erzelmiSlider')?.value || 0);
    const m = parseInt(document.getElementById('mentalisSlider')?.value || 0);

    const box = document.getElementById('temAnalysisBox');
    if (!box) return;
    if (t === 0 && er === 0 && m === 0) { box.innerHTML = ''; return; }

    const atlag = Math.round((t + er + m) / 3);
    const spread = Math.max(t, er, m) - Math.min(t, er, m);

    const dims = [{n:'testi', v:t, label:'testben'}, {n:'érzelmi', v:er, label:'érzelmekben'}, {n:'mentális', v:m, label:'gondolatokban'}];
    dims.sort((a,b) => b.v - a.v);
    const dominans = dims[0];
    const masodik = dims[1];
    const harmadik = dims[2];

    // Intenzitás — kliensnek szóló, empatikus megfogalmazás
    let intenzitas = '';
    if (atlag <= 20) intenzitas = 'Úgy tűnik, ez most csak finoman van jelen benned — inkább csak egy halvány érzésként, mint valami nehézként.';
    else if (atlag <= 40) intenzitas = 'Ez a téma érezhetően jelen van, de még nem nyomasztó — valahol a háttérben dolgozik.';
    else if (atlag <= 60) intenzitas = 'Ez elég erősen érint téged most — érzed a súlyát, és valószínűleg már régóta cipeled.';
    else if (atlag <= 80) intenzitas = 'Ez nagyon erősen van benned — lehet, hogy ez az egyik legfontosabb dolog, amin most dolgozni kell.';
    else intenzitas = 'Ez most rendkívül intenzíven van jelen — ez egy mélyen gyökerező, régóta tárolt téma, ami nagyon szeretne végre szabadulni.';

    // Domináns dimenzió — kliensnek érthetően
    const domUzenet = {
        'testi': `A tested az, ami a legtöbbet érzi ebből. Lehet, hogy fizikai feszültségként, görcsként, fáradtságként, vagy valamilyen testi érzésként jelenik meg — a tested már régóta hordozza ezt helyetted.`,
        'érzelmi': `Az érzéseid azok, amik a legjobban megmozdulnak ebben. Lehet, hogy szomorúság, félelem, düh vagy valami nehezen megnevezhető érzés — de ezek az érzések pontosan azt mutatják, hogy hol kell gyógyulni.`,
        'mentális': `A gondolataid azok, amik a legtöbbet forognak körülötte. Lehet, hogy ismétlődő mondatok a fejedben, "úgyis hiába", "nem vagyok elég" típusú gondolatok — az elméd próbálja feldolgozni, amit még nem sikerült elengedni.`
    };

    // Kombináció — természetes, értő hangon
    let kombinacio = '';
    if (spread <= 15) {
        kombinacio = `Ez egész lényedet érinti — a tested, az érzéseid és a gondolataid egyszerre jelzik ugyanazt. Ez azt mutatja, hogy ez a téma nagyon mélyen beágyazódott, de ezért nagyon fontos, hogy most foglalkozzatok vele.`;
    } else if (dominans.v - harmadik.v >= 40) {
        kombinacio = `Leginkább a ${dominans.label} érzed — ott a legerősebb. A ${masodik.label} is jelen van, de a ${harmadik.label} kevésbé érintett most.`;
    } else {
        kombinacio = `Főleg a ${dominans.label} és a ${masodik.label} jelenik meg — ezek kéz a kézben dolgoznak egymással.`;
    }

    // Bátorítás az átlag alapján
    let batoritas = '';
    if (atlag <= 30) {
        batoritas = '💚 Ez egy jó hír — ez a blokk könnyen elérhető, és jó eséllyel ma már sokat tudtok lazítani rajta.';
    } else if (atlag <= 60) {
        batoritas = '🌿 Ez dolgozható — lehet, hogy több réteg van alatta, de minden lépés számít, és már az is változás, hogy itt vagy és foglalkozol vele.';
    } else {
        batoritas = '🤍 Ez egy nagy és fontos munka — ne ijedj meg az erős értékektől. Az, hogy ilyen intenzíven jelen van, azt is jelenti, hogy nagyon készen áll arra, hogy végre elengedhesd.';
    }

    const szoveg = domUzenet[dominans.n] + ' ' + kombinacio + ' ' + batoritas;

    // Vizuális jelző a három értékhez
    function szinSav(v) {
        if (v <= 20) return '#bbf7d0';
        if (v <= 40) return '#fde68a';
        if (v <= 60) return '#fed7aa';
        if (v <= 80) return '#fca5a5';
        return '#f87171';
    }

    box.innerHTML = `
        <div style="background:#faf5ff; border:2px solid #d8b4fe; border-radius:12px; padding:16px; margin-top:0;">
            <p style="font-weight:700; color:#6b21a8; margin-bottom:12px;">🔍 TEM Elemzés</p>
            <div style="display:flex; gap:8px; margin-bottom:14px;">
                <div style="flex:1; text-align:center; background:${szinSav(t)}; border-radius:8px; padding:8px 4px;">
                    <div style="font-size:0.75rem; font-weight:600; color:#374151;">🫀 Testi</div>
                    <div style="font-size:1.3rem; font-weight:800; color:#1f2937;">${t}%</div>
                </div>
                <div style="flex:1; text-align:center; background:${szinSav(er)}; border-radius:8px; padding:8px 4px;">
                    <div style="font-size:0.75rem; font-weight:600; color:#374151;">💭 Érzelmi</div>
                    <div style="font-size:1.3rem; font-weight:800; color:#1f2937;">${er}%</div>
                </div>
                <div style="flex:1; text-align:center; background:${szinSav(m)}; border-radius:8px; padding:8px 4px;">
                    <div style="font-size:0.75rem; font-weight:600; color:#374151;">🧠 Mentális</div>
                    <div style="font-size:1.3rem; font-weight:800; color:#1f2937;">${m}%</div>
                </div>
                <div style="flex:1; text-align:center; background:${szinSav(atlag)}; border-radius:8px; padding:8px 4px;">
                    <div style="font-size:0.75rem; font-weight:600; color:#374151;">⚖️ Átlag</div>
                    <div style="font-size:1.3rem; font-weight:800; color:#1f2937;">${atlag}%</div>
                </div>
            </div>
            <p style="font-size:0.85rem; color:#374151; margin-bottom:6px;"><strong>Intenzitás:</strong> ${intenzitas}</p>
            <p style="line-height:1.75; color:#1f2937; font-size:0.95rem;">${szoveg}</p>
        </div>`;
}

function createCircleDiagram(diag, type) {
    const opts = diag.options;
    const colors = diag.colors;
    const angleStep = 360 / opts.length;
    const centerX = 300, centerY = 300, radius = 250;
    
    let paths = '';
    
    opts.forEach(function(opt, i) {
        const angle1 = (i * angleStep - 90) * Math.PI / 180;
        const angle2 = ((i + 1) * angleStep - 90) * Math.PI / 180;
        const x1 = centerX + radius * Math.cos(angle1);
        const y1 = centerY + radius * Math.sin(angle1);
        const x2 = centerX + radius * Math.cos(angle2);
        const y2 = centerY + radius * Math.sin(angle2);
        
        const midAngle = (angle1 + angle2) / 2;
        const textRadius = radius * 0.65;
        const textX = centerX + textRadius * Math.cos(midAngle);
        const textY = centerY + textRadius * Math.sin(midAngle);
        
        let rotationAngle = (midAngle * 180 / Math.PI);
        
        const escaped = opt.replace(/'/g, '&#39;');
        const textLen = opt.length;
        const fontSize = textLen > 25 ? 10 : (textLen > 20 ? 11 : (textLen > 15 ? 12 : (textLen > 10 ? 13 : 14)));
        
        const isDark = diag.darkSlices && diag.darkSlices.includes(i);
        const textColor = isDark ? '#ffffff' : '#1f2937';
        const textShadow = isDark ? '0px 0px 4px rgba(0,0,0,0.8)' : '0px 0px 4px rgba(255,255,255,0.9)';

        paths += '<path class="diagram-sector" data-option="' + escaped + '" d="M' + centerX + ',' + centerY + ' L' + x1 + ',' + y1 + ' A' + radius + ',' + radius + ' 0 0,1 ' + x2 + ',' + y2 + ' Z" fill="' + colors[i] + '" onclick="toggleOption(\'' + escaped + '\', ' + !!steps[currentStep].multiple + ')" style="cursor: pointer; transition: all 0.2s; stroke: #fff; stroke-width: 2;" onmouseover="this.style.opacity=0.8; this.style.strokeWidth=3;" onmouseout="this.style.opacity=1; this.style.strokeWidth=2;" />';
        // Két sorba törés: / karakternél, vagy ha túl hosszú, félúton
        let textContent;
        const lineHeight = fontSize * 1.2;
        if (opt.includes(' / ')) {
            const parts = opt.split(' / ');
            textContent = '<tspan x="' + textX + '" dy="-' + (lineHeight/2) + '">' + parts[0] + '</tspan>' +
                          '<tspan x="' + textX + '" dy="' + lineHeight + '">' + parts[1] + '</tspan>';
        } else if (opt.length > 18) {
            const words = opt.split(' ');
            const mid = Math.ceil(words.length / 2);
            const line1 = words.slice(0, mid).join(' ');
            const line2 = words.slice(mid).join(' ');
            textContent = '<tspan x="' + textX + '" dy="-' + (lineHeight/2) + '">' + line1 + '</tspan>' +
                          '<tspan x="' + textX + '" dy="' + lineHeight + '">' + line2 + '</tspan>';
        } else {
            textContent = opt;
        }
        paths += '<text x="' + textX + '" y="' + textY + '" font-size="' + fontSize + '" text-anchor="middle" dominant-baseline="middle" transform="rotate(' + rotationAngle + ' ' + textX + ' ' + textY + ')" style="pointer-events: none; font-weight: bold; fill: ' + textColor + '; text-shadow: ' + textShadow + ';">' + textContent + '</text>';
    });
    
    return '<svg viewBox="0 0 600 600" style="width: 100%; max-width: 600px; height: auto; margin: 20px auto; display: block;">' + paths + '</svg>';
}

function openDiagram(type, isMultiple) {
    const diag = diagrams[type];
    if (!diag) return;
    
    const step = steps[currentStep];
    document.getElementById('diagramTitle').textContent = diag.title;
    document.getElementById('diagramQuestion').textContent = step.question || '';
    
    // Restore previously selected options
    if (sessionData.answers[currentStep]) {
        selectedOptions = sessionData.answers[currentStep].split(', ');
    } else {
        selectedOptions = [];
    }
    
    let html = createCircleDiagram(diag, type);
    html += '<div class="diagram-grid" style="margin-top: 24px;">';
    diag.options.forEach(function(opt, i) {
        const isSelected = selectedOptions.includes(opt);
        const selectedClass = isSelected ? ' selected' : '';
        const displayOpt = opt;
        html += '<button class="diagram-button' + selectedClass + '" data-option="' + opt.replace(/'/g, "&#39;") + '" onclick="toggleOption(\'' + opt.replace(/'/g, "&#39;") + '\', ' + isMultiple + ')">' + displayOpt + '</button>';
    });
    html += '</div>';
    
    if (isMultiple) {
        html += '<button class="btn btn-purple" style="margin-top: 16px;" onclick="saveMultipleOptions()">Kiválasztás mentése</button>';
        html += '<button class="btn btn-skip" style="margin-top: 8px;" onclick="skipDiagram()">Kihagyás</button>';
    } else if (diag.confirm) {
        html += '<button class="btn btn-purple" style="margin-top: 16px;" onclick="saveConfirmOption()">Tovább →</button>';
        html += '<button class="btn btn-skip" style="margin-top: 8px;" onclick="skipDiagram()">Kihagyás</button>';
    } else {
        html += '<button class="btn btn-skip" style="margin-top: 16px;" onclick="skipDiagram()">Kihagyás</button>';
    }
    html += '<button class="btn btn-secondary" style="margin-top: 8px;" onclick="closeDiagram()">Bezárás</button>';
    
    document.getElementById('diagramContent').innerHTML = html;
    document.getElementById('diagramModal').classList.add('active');
    
    // Betűméret igazítása: ha csak pár betű lóg át, csökkentjük a méretet
    requestAnimationFrame(() => fitButtonTexts());
}

function fitButtonTexts() {
    const buttons = document.querySelectorAll('.diagram-button');
    buttons.forEach(btn => {
        btn.style.fontSize = '15px';
        btn.style.whiteSpace = 'nowrap';
        
        let fontSize = 15;
        while (btn.scrollWidth > btn.offsetWidth && fontSize > 13) {
            fontSize -= 0.5;
            btn.style.fontSize = fontSize + 'px';
        }

        // Ha 13px-en még mindig nem fér el, sortörés 14px-en
        if (btn.scrollWidth > btn.offsetWidth) {
            btn.style.whiteSpace = 'normal';
            btn.style.fontSize = '14px';
        }
    });
}

function toggleOption(option, isMultiple) {
    const index = selectedOptions.indexOf(option);
    
    if (isMultiple) {
        // Multiple selection mode
        if (index > -1) {
            selectedOptions.splice(index, 1);
        } else {
            selectedOptions.push(option);
        }
        // Update button states
        const buttons = document.querySelectorAll('.diagram-button');
        buttons.forEach(btn => {
            if (btn.getAttribute('data-option') === option) {
                btn.classList.toggle('selected');
            }
        });
    } else {
        // Single selection mode
        const diag = diagrams[steps[currentStep].diagram];
        if (diag && diag.confirm) {
            // Confirm mód: csak jelöljük ki, nem zárjuk be
            selectedOptions = [option];
            document.querySelectorAll('.diagram-button').forEach(btn => {
                btn.classList.toggle('selected', btn.getAttribute('data-option') === option);
            });
            // SVG cikkelyek kiemelése
            document.querySelectorAll('.diagram-sector').forEach(path => {
                path.style.opacity = path.getAttribute('data-option') === option ? '0.7' : '1';
                path.style.strokeWidth = path.getAttribute('data-option') === option ? '4' : '2';
            });
        } else {
            // Azonnali mentés
            if (currentStep === 3) {
                sessionData.measurements.initial = option;
            } else if (currentStep === 14) {
                sessionData.temValues.Testi = parseInt(option);
            } else if (currentStep === 15) {
                sessionData.temValues.Erzelmi = parseInt(option);
            } else if (currentStep === 16) {
                sessionData.temValues.Mentalis = parseInt(option);
            } else if (currentStep === 30) {
                sessionData.measurements.final = option;
            } else {
                sessionData.answers[currentStep] = option;
            }
            closeDiagram();
            if (!completedSteps.includes(currentStep)) completedSteps.push(currentStep);
            loadStep(currentStep);
        }
    }
}

function saveConfirmOption() {
    if (selectedOptions.length === 0) return;
    const option = selectedOptions[0];
    if (currentStep === 3) {
        sessionData.measurements.initial = option;
    } else if (currentStep === 14) {
        sessionData.temValues.Testi = parseInt(option);
    } else if (currentStep === 15) {
        sessionData.temValues.Erzelmi = parseInt(option);
    } else if (currentStep === 16) {
        sessionData.temValues.Mentalis = parseInt(option);
    } else if (currentStep === 30) {
        sessionData.measurements.final = option;
    } else {
        sessionData.answers[currentStep] = option;
    }
    closeDiagram();
    if (!completedSteps.includes(currentStep)) completedSteps.push(currentStep);
    loadStep(currentStep);
}

function saveMultipleOptions() {
    if (selectedOptions.length > 0) {
        sessionData.answers[currentStep] = selectedOptions.join(', ');
    }
    
    closeDiagram();
    
    if (!completedSteps.includes(currentStep)) {
        completedSteps.push(currentStep);
    }
    
    loadStep(currentStep);
}

function skipDiagram() {
    sessionData.answers[currentStep] = 'Kihagyva';
    
    closeDiagram();
    
    if (!completedSteps.includes(currentStep)) {
        completedSteps.push(currentStep);
    }

}

function saveSessionDOCX() {
    // Make sure texts are generated
    if (!sessionData.releasingTexts) {
        generateReleasingText();
    }
    if (!sessionData.integratingTexts) {
        generateIntegratingText();
    }

    const datum = new Date(sessionData.timestamp).toLocaleString('hu-HU');
    const clientInfo = sessionData.clientName || 'N/A';
    
    // Build HTML content
    let htmlContent = `
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h1 { text-align: center; color: #9333ea; }
        h2 { color: #7e22ce; margin-top: 30px; border-bottom: 2px solid #9333ea; padding-bottom: 5px; }
        p { margin: 10px 0; line-height: 1.6; }
        .info { margin: 20px 0; }
    </style>
</head>
<body>
    <h1>INGÁS BLOKKOLDÓ KEZELŐLAP</h1>
    <div class="info">
        <p><strong>Kliens:</strong> ${clientInfo}</p>
        <p><strong>Dátum:</strong> ${datum}</p>
    </div>
    
    <h2>MÉRÉSEK</h2>
    <p><strong>Kezdeti mérés:</strong> ${sessionData.measurements.initial || 'N/A'}</p>
    <p><strong>Záró mérés:</strong> ${sessionData.measurements.final || 'N/A'}</p>
    
    <h2>TEM MÉRÉS (Testi-Érzelmi-Mentális)</h2>

    <p><strong>Érzelmi szint:</strong> ${sessionData.temValues.Erzelmi}%</p>
    <p><strong>Mentális szint:</strong> ${sessionData.temValues.Mentalis}%</p>
    
    <h2>FELTÁRT TERÜLETEK</h2>`;
    
    // Add answers
    for (let stepId in sessionData.answers) {
        const step = steps[stepId];
        if (step && sessionData.answers[stepId]) {
            htmlContent += `<p><strong>${step.name}:</strong> ${sessionData.answers[stepId]}</p>`;
        }
    }
    
    // Notes section
    const hasNotes = Object.keys(sessionData.notes).some(k => sessionData.notes[k] && sessionData.notes[k].trim() && sessionData.notesOnDoc[k] !== false);
    if (hasNotes) {
        htmlContent += `<h2>KEZELŐI JEGYZETEK</h2>`;
        for (let stepId in sessionData.notes) {

            }

    // Releasing text

        }
    });
    
    // Integrating text
    htmlContent += `<h2>INTEGRÁLÓ SZÖVEG</h2>`;
    const integratingLines = sessionData.integratingTexts.split('\n\n');
    integratingLines.forEach(line => {
        if (line.trim()) {
            htmlContent += `<p>${line.trim()}</p>`;
        }
    });
    
    // Kezelői megjegyzések
    if (sessionData.kliensAllapot || sessionData.kovetkezoKezeles || sessionData.kezeloiMegjegyzes) {

    <p style="margin-top: 30px;">Kezelő aláírása: _______________________</p>

    <p>_______________________________________________________________</p>

</body>

function nextStep() {
    if (currentStep < steps.length - 1) {
        if (!completedSteps.includes(currentStep)) {
            completedSteps.push(currentStep);
        }
        loadStep(currentStep + 1);
    }
}

function prevStep() {
    if (currentStep > 0) {
        loadStep(currentStep - 1);
    }
}

function jumpToStep(index) {
    loadStep(index);
}

function confirmFinish() {
    if (confirm('🙏 Új kezelést indítasz? A jelenlegi adatok elvesznek, ha nem mentetted el!')) {
        resetSession();
    }
}

function resetSession() {
    currentStep = 0;
    completedSteps = [];
    selectedOptions = [];
    sessionData = {
        answers: {},
        notes: {},
        notesOnDoc: {},
        measurements: { initial: null, final: null },
        temValues: { Testi: 0, Erzelmi: 0, Mentalis: 0 },
        releasingTexts: '',
        integratingTexts: '',
        timestamp: null,
        clientName: '',
        kezeloiMegjegyzes: '',
        kovetkezoKezeles: '',
        kliensAllapot: ''
    };
    init();
}

function openSearch() {
    document.getElementById('searchOverlay').classList.add('active');
    setTimeout(() => document.getElementById('searchInput').focus(), 50);
}

function closeSearch() {
    document.getElementById('searchOverlay').classList.remove('active');
    document.getElementById('searchInput').value = '';
    document.getElementById('searchResults').innerHTML = '<div class="search-empty">Kezdj el gépelni a kereséshez...</div>';
}

function closeSearchOnOverlay(e) {
    if (e.target === document.getElementById('searchOverlay')) closeSearch();
}

function highlight(text, query) {
    if (!query) return text;
    const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    return text.replace(re, '<span class="search-highlight">$1</span>');
}

function doSearch() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    const resultsEl = document.getElementById('searchResults');

    if (query.length < 2) {
        resultsEl.innerHTML = '<div class="search-empty">Kezdj el gépelni a kereséshez...</div>';
        return;
    }

    const results = [];

    // 1. Lépés nevekben és kérdésekben keresés
    steps.forEach(step => {
        if (step.name.toLowerCase().includes(query) || (step.question && step.question.toLowerCase().includes(query))) {
            results.push({
                type: 'Lépés',
                title: step.icon + ' ' + step.name,
                sub: step.question || '',
                action: () => { closeSearch(); jumpToStep(step.id); }
            });
        }
    });

    // 2. Diagram nevekben keresés
    Object.entries(diagrams).forEach(([diagKey, diag]) => {
        if (diag.title.toLowerCase().includes(query)) {
            const relatedSteps = steps.filter(s => s.diagram === diagKey);
            relatedSteps.forEach(step => {
                // Csak ha még nem szerepel a lépés a találatok között
                if (!results.find(r => r.type === 'Lépés' && r.title.includes(step.name))) {
                    results.push({
                        type: 'Diagram',
                        title: highlight(diag.title, query),
                        sub: step.icon + ' ' + step.name + ' lépésben',
                        action: () => { closeSearch(); jumpToStep(step.id); }
                    });
                }
            });
        }
    });

    // 2. Diagram opciókban keresés
    Object.entries(diagrams).forEach(([diagKey, diag]) => {
        diag.options.forEach(opt => {
            if (opt.toLowerCase().includes(query)) {
                const relatedSteps = steps.filter(s => s.diagram === diagKey);
                relatedSteps.forEach(step => {
                    results.push({
                        type: 'Diagram opció',
                        title: highlight(opt, query),
                        sub: step.icon + ' ' + step.name + ' lépésben',
                        action: () => { closeSearch(); jumpToStep(step.id); }
                    });
                });
            }
        });
    });

    // 3. Kezelői jegyzetekben keresés
    Object.entries(sessionData.notes).forEach(([stepId, note]) => {
        if (note && note.toLowerCase().includes(query)) {
            const step = steps[stepId];
            const stepName = step ? step.icon + ' ' + step.name : ('Lépés ' + stepId);
            const idx = note.toLowerCase().indexOf(query);
            const snippet = '...' + note.substring(Math.max(0, idx - 30), idx + 50).trim() + '...';
            results.push({
                type: 'Kezelői jegyzet',
                title: stepName,
                sub: highlight(snippet, query),
                action: () => { closeSearch(); jumpToStep(parseInt(stepId)); }
            });
        }
    });

    // 4. Mentett válaszokban keresés
    Object.entries(sessionData.answers).forEach(([stepId, answer]) => {
        if (answer && answer.toLowerCase().includes(query)) {
            const step = steps[stepId];
            const stepName = step ? step.icon + ' ' + step.name : ('Lépés ' + stepId);
            results.push({
                type: 'Mentett válasz',
                title: stepName,
                sub: highlight(answer, query),
                action: () => { closeSearch(); jumpToStep(parseInt(stepId)); }
            });
        }
    });

    // 5. Oldó és integráló szövegekben keresés
    if (sessionData.releasingTexts && sessionData.releasingTexts.toLowerCase().includes(query)) {
        const idx = sessionData.releasingTexts.toLowerCase().indexOf(query);
        const snippet = '...' + sessionData.releasingTexts.substring(Math.max(0, idx - 30), idx + 50).trim() + '...';
        results.push({
            type: 'Oldó szöveg',
            title: '📖 Oldó Szövegek',
            sub: highlight(snippet, query),
            action: () => { closeSearch(); jumpToStep(31); }
        });
    }
    if (sessionData.integratingTexts && sessionData.integratingTexts.toLowerCase().includes(query)) {
        const idx = sessionData.integratingTexts.toLowerCase().indexOf(query);
        const snippet = '...' + sessionData.integratingTexts.substring(Math.max(0, idx - 30), idx + 50).trim() + '...';
        results.push({
            type: 'Integráló szöveg',
            title: '💫 Oldó Szövegek',
            sub: highlight(snippet, query),
            action: () => { closeSearch(); jumpToStep(31); }
        });
    }

    if (results.length === 0) {
        resultsEl.innerHTML = '<div class="search-empty">Nincs találat: „' + query + '"</div>';
        return;
    }

    window.searchResults = results;
    resultsEl.innerHTML = results.map((r, i) => `
        <div class="search-result-item" onclick="window.searchResults[${i}].action()">
            <div class="search-result-type">${r.type}</div>
            <div class="search-result-title">${r.title}</div>
            ${r.sub ? '<div class="search-result-sub">' + r.sub + '</div>' : ''}
        </div>
    `).join('');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSearch(); });

init();
    </script>
